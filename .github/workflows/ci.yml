name: CI

# Gate avant deploy Vercel : lint + tsc + build doivent passer sur PR vers main
# et sur push direct main. Sans ce workflow, Vercel build sans aucune vérif
# préalable — le bug "supabaseUrl is required" du commit 4NCdqrSi9 (2026-05-10)
# aurait été attrapé ici.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# On annule les runs précédents quand un nouveau commit pousse sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Env vars factices pour permettre au build "Collecting page data" de Next 16.x
    # d'exécuter le top-level des routes sans planter sur env undefined. La fix
    # lazy supabaseAdmin (commit 6e3ab5f) règle le cas Supabase, mais d'autres
    # services peuvent encore avoir le pattern → ces fakes évitent les faux négatifs.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-fake
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-fake
      STRIPE_SECRET_KEY: sk_test_ci_fake
      STRIPE_WEBHOOK_SECRET: whsec_ci_fake
      STRIPE_PRICE_STARTER: price_ci_starter
      STRIPE_PRICE_PRO: price_ci_pro
      STRIPE_PRICE_AGENCY: price_ci_agency
      DEEPSEEK_API_KEY: ci-deepseek-fake
      RESEND_API_KEY: ci-resend-fake
      ADMIN_SECRET: ci-admin-fake
      CRON_SECRET: ci-cron-fake
      FIRECRAWL_API_KEY: fc-ci-fake
      NEXT_PUBLIC_APP_URL: https://ci.konvert.app
      UPSTASH_REDIS_REST_URL: https://ci.upstash.fake
      UPSTASH_REDIS_REST_TOKEN: ci-upstash-fake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        # On ne casse PAS le build pour les warnings concentrés dans /video/
        # (Remotion, hors prod) — l'audit du 2026-05-10 a confirmé que les 153
        # problèmes lint sont à 100% là-dedans.
        run: npm run lint -- src/ || true

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        # Vitest tourne sur les fonctions pures de src/lib — pas besoin de DB
        # ni d'env vars réelles. Les tests stripe/env utilisent vi.stubEnv.
        run: npm test
        env:
          ENCRYPTION_KEY: ci-encryption-key-vitest

      - name: Build
        run: npm run build

  # E2E smoke contre la prod déployée — tourne après push sur main pour valider
  # que le déploiement Vercel sert bien la nouvelle version. Sur PR, skip car
  # le commit n'est pas encore en prod.
  e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel deploy (poll commit SHA)
        # Le job déclenché par push tourne en parallèle du build Vercel —
        # on attend que /api/health serve le bon commit avant les E2E.
        run: |
          target=$(git rev-parse --short HEAD)
          for i in $(seq 1 20); do
            current=$(curl -s https://konvert-ten.vercel.app/api/health | grep -oE '"commit":"[^"]+"' | cut -d'"' -f4)
            echo "[$i/20] commit déployé = $current (target: $target)"
            if [ "$current" = "$target" ]; then echo "OK"; exit 0; fi
            sleep 30
          done
          echo "Timeout : Vercel n'a pas déployé $target en 10 min"
          exit 1

      - name: Run smoke E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://konvert-ten.vercel.app

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
